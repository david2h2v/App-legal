<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Legal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f0f2f5;}
header{background:#1e2a38;color:white;padding:15px;text-align:center;}
.container{padding:10px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button{padding:10px;border:none;border-radius:8px;margin:5px 2px;cursor:pointer;background:#1e2a38;color:white;}
.card{background:white;padding:10px;margin:8px 0;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.row{display:flex;justify-content:space-between;align-items:center;}
.small{font-size:13px;color:#555;}
.menu button{background:#ddd;color:black;}
.hidden{display:none;}
</style>
</head>

<body>

<header>App Legal</header>

<div class="container">

<input id="buscar" placeholder="Buscar cliente...">

<input id="cliente" placeholder="Nombre del cliente">
<button onclick="agregarCliente()">Agregar cliente</button>

<div id="clientes"></div>

<hr>

<div id="panelJuicios" class="hidden">

<h3 id="titulo"></h3>

<input id="juicioNombre" placeholder="Nombre del juicio">
<input id="juicioEstado" placeholder="Estado procesal">

<button onclick="agregarJuicio()">Agregar juicio</button>

<div id="juicios"></div>

<button onclick="volver()">Volver</button>

</div>

</div>

<script>

const inputCliente = document.getElementById("cliente");
const inputBuscar = document.getElementById("buscar");
const contClientes = document.getElementById("clientes");
const panelJuicios = document.getElementById("panelJuicios");
const titulo = document.getElementById("titulo");
const contJuicios = document.getElementById("juicios");
const juicioNombre = document.getElementById("juicioNombre");
const juicioEstado = document.getElementById("juicioEstado");

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let clienteActual = null;

function guardar(){
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

function agregarCliente(){
  let nombre = inputCliente.value.trim();
  if(!nombre) return;

  clientes.push({nombre, juicios:[]});
  guardar();
  inputCliente.value="";
  mostrarClientes();
}

function mostrarClientes(){
  let filtro = inputBuscar.value.toLowerCase();
  contClientes.innerHTML="";

  clientes.forEach((c,i)=>{
    if(!c.nombre.toLowerCase().includes(filtro)) return;

    contClientes.innerHTML+=`
    <div class="card">
      <div class="row">
        <b onclick="abrirCliente(${i})">${c.nombre}</b>
        <div class="menu">
          <button onclick="eliminarCliente(${i})">🗑</button>
        </div>
      </div>
      <div class="small">${c.juicios.length} juicios</div>
    </div>`;
  });
}

function abrirCliente(i){
  clienteActual=i;
  panelJuicios.classList.remove("hidden");
  titulo.innerText="Juicios de "+clientes[i].nombre;
  mostrarJuicios();
}

function volver(){
  panelJuicios.classList.add("hidden");
}

function agregarJuicio(){
  if(clienteActual===null) return;

  let nombre=juicioNombre.value.trim();
  let estado=juicioEstado.value.trim();

  if(!nombre||!estado) return;

  clientes[clienteActual].juicios.push({nombre,estado});
  guardar();

  juicioNombre.value="";
  juicioEstado.value="";

  mostrarJuicios();
  mostrarClientes();
}

function mostrarJuicios(){
  contJuicios.innerHTML="";

  clientes[clienteActual].juicios.forEach((j,i)=>{
    contJuicios.innerHTML+=`
    <div class="card">
      <div class="row">
        <b>${j.nombre}</b>
        <div class="menu">
          <button onclick="editar(${i})">✏</button>
          <button onclick="eliminarJuicio(${i})">🗑</button>
        </div>
      </div>
      <div class="small">${j.estado}</div>
    </div>`;
  });
}

function editar(i){
  let nuevo = prompt("Nuevo estado procesal:");
  if(!nuevo) return;

  clientes[clienteActual].juicios[i].estado=nuevo;
  guardar();
  mostrarJuicios();
}

function eliminarCliente(i){
  if(confirm("Eliminar cliente?")){
    clientes.splice(i,1);
    guardar();
    mostrarClientes();
  }
}

function eliminarJuicio(i){
  if(confirm("Eliminar juicio?")){
    clientes[clienteActual].juicios.splice(i,1);
    guardar();
    mostrarJuicios();
    mostrarClientes();
  }
}

inputBuscar.addEventListener("keyup", mostrarClientes);

mostrarClientes();

</script>

</body>
</html>
