<!DOCTYPE html>
<html>
<head>
  <title>App Legal</title>
</head>
<body>

<h2>Clientes</h2>

<input type="text" id="cliente" placeholder="Nombre del cliente">
<button onclick="agregarCliente()">Agregar</button>

<ul id="lista"></ul>

<script>
let clientes = [];

function agregarCliente() {
  let nombre = document.getElementById("cliente").value;
  if(nombre === "") return;

  clientes.push({nombre: nombre, juicios: []});
  mostrar();
  document.getElementById("cliente").value = "";
}

function mostrar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach((c, index) => {
    let item = document.createElement("li");
    item.innerHTML = c.nombre + " <button onclick='verJuicios("+index+")'>Ver juicios</button>";
    lista.appendChild(item);
  });
}

function verJuicios(i) {
  let nombre = prompt("Nombre del juicio:");
  let estado = prompt("Estado procesal:");

  if(nombre && estado){
    clientes[i].juicios.push({nombre, estado});
    alert("Juicio agregado");
  }
}
</script>

</body>
</html>
